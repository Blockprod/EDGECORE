# EDGECORE — Paper Trading Configuration
# Loaded via EDGECORE_MODE=paper on top of the active EDGECORE_ENV config.
#
# Purpose: override production/dev risk limits and execution settings for
# paper-trading sessions so operators cannot accidentally trade real money with
# live-sized positions.
#
# How it is applied:
#   Settings.__init__() loads dev.yaml / prod.yaml first (selected by EDGECORE_ENV),
#   then merges THIS file on top when EDGECORE_MODE=paper. execution.use_sandbox
#   and execution.mode are forced to True / "paper" programmatically even without
#   this file, but the overrides below add tighter risk limits.
#
# Usage:
#   $env:EDGECORE_MODE = "paper"
#   venv\Scripts\python.exe main.py
#
# Note: EDGECORE_ENV still selects the universe and strategy params (dev vs prod).
# This file only touches risk, execution, and trading operational limits.

execution:
  engine: "ibkr"
  use_sandbox: true                 # Always true in paper mode
  mode: "paper"                     # Discriminant read by callers
  # IBKR paper-trading TWS port (7497 paper vs 7496 live)
  timeout_seconds: 30
  max_retries: 3
  initial_capital: 100000.0
  paper_trading_loop_interval_seconds: 15
  paper_slippage_model: "adaptive"
  paper_commission_pct: 0.005

risk:
  # C-10: Tighter risk limits for paper mode — prevents inflated position sizing
  # that would shock the operator if they switch to live accidentally.
  max_concurrent_positions: 12      # v63 certified value
  max_risk_per_trade: 0.005         # 0.5% of equity per trade
  max_consecutive_losses: 5
  max_daily_loss_pct: 0.02          # 2% daily loss circuit breaker
  max_drawdown_pct: 0.10            # 10% — must satisfy T1 ≤ T2 ≤ T3
  max_leverage: 1.0                 # No leverage in paper mode

trading:
  max_loop_iterations: 999999       # Run indefinitely in paper mode
  max_consecutive_errors: 10
  data_max_age_hours: 4.0           # Accept up to 4h stale data in paper
  max_allocation_pct: 0.15          # 15% per pair — réduit après analyse robustesse 2025
  equity_tolerance_pct: 0.01
  reconciliation_divergence_pct: 0.10
  fallback_spread_vol: 0.02
  min_order_quantity: 1.0
  limit_price_offset_pct: 0.01
  paper_fill_rate: 0.95             # 95% fill rate — model partial fills

# ── v63 Sweet Set — CERT-03b certified (Combined Sharpe 0.5554) ──────────────
# Applied on top of dev.yaml / prod.yaml when EDGECORE_MODE=paper.
# DO NOT modify without re-running walk-forward validation.

strategy:
  entry_z_score: 1.8                # v63 certified
  exit_z_score: 0.10                # v63 certified — faster profit capture
  z_score_stop: 4.0
  entry_z_min_spread: 0.0
  lookback_window: 180
  additional_lookback_windows: [63]
  adf_pvalue_threshold: 0.15
  min_correlation: 0.65
  fdr_q_level: 0.30
  max_half_life: 60
  use_kalman: true
  bonferroni_correction: false
  johansen_confirmation: true
  newey_west_consensus: true
  weekly_zscore_entry_gate: 0.0
  max_position_loss_pct: 0.05       # 5% per-position stop
  internal_max_drawdown_pct: 0.25

regime:
  enabled: true
  neutral_band_pct: 0.02            # v63 certified
  neutral_sizing: 1.0
  trend_favorable_sizing: 1.0
  trend_unfavorable_sizing: 0.30    # v63 certified — key lever for W3 protection

momentum:
  enabled: false                    # Disabled in v63 Sweet Set

pair_blacklist:
  enabled: true                     # KEY v63 breakthrough — blocks chronic losers
  max_consecutive_losses: 2
  cooldown_days: 30
