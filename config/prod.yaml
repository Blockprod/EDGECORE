execution:
  engine: "ccxt"
  exchange: "binance"
  timeout_seconds: 15
  max_retries: 5
  slippage_bps: 3.0
  use_sandbox: false
  paper_trading_loop_interval_seconds: 5
  initial_capital: 1000000.0
  paper_slippage_model: "adaptive"
  paper_commission_pct: 0.08

backtest:
  start_date: "2022-01-01"
  end_date: "2024-01-01"
  initial_capital: 5000000.0
  commission_bps: 1.0
  walk_forward_periods: 12
  out_of_sample_ratio: 0.2
