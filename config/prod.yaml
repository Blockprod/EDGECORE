    - "VLO"
    # Industrials
    - "CAT"
    - "DE"
    - "HON"
    - "GE"
    - "RTX"
    - "LMT"
    - "UPS"
    - "FDX"
    - "BA"
    - "MMM"
    # Materials
    - "LIN"
    - "APD"
    - "FCX"
    - "NEM"
    # Utilities
    - "NEE"
    - "DUK"
    - "SO"
    - "D"
