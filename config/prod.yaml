    - "O"
    # Communication Services
    - "DIS"
    - "NFLX"
    - "CMCSA"
    - "T"
    - "VZ"

  max_leverage: 1.5              # Conservative in production

execution:
  engine: "ibkr"
  timeout_seconds: 30
  max_retries: 5
  slippage_bps: 2.0
  use_sandbox: false             # LIVE trading
  initial_capital: 100000.0

backtest:
  start_date: "2016-01-01"      # 10 years history for robustness
  end_date: "2026-01-01"
  initial_capital: 100000.0
  commission_bps: 2.0
  walk_forward_periods: 8
  out_of_sample_ratio: 0.2

risk:
  max_concurrent_positions: 12
  max_risk_per_trade: 0.004       # 0.4% of equity per trade
  max_consecutive_losses: 4
  max_daily_loss_pct: 0.015       # 1.5% daily drawdown circuit breaker
  max_leverage: 1.5
  max_drawdown_pct: 0.08          # 8% portfolio drawdown hard stop
