strategy:
  lookback_window: 252
  entry_z_score: 2.0
  exit_z_score: 0.0
  min_correlation: 0.7
  max_half_life: 60

risk:
  max_risk_per_trade: 0.005
  max_concurrent_positions: 5
  max_daily_loss_pct: 0.01
  max_consecutive_losses: 2
  volatility_percentile_threshold: 1.5
  position_sizing_method: "volatility"
  max_leverage: 2.0

execution:
  engine: "ccxt"
  exchange: "binance"
  timeout_seconds: 10
  max_retries: 5
  slippage_bps: 3.0
  use_sandbox: true
  # Override with ENABLE_LIVE_TRADING=true env var ONLY for live trading
  paper_trading_loop_interval_seconds: 3600
  initial_capital: 5000.0
  paper_slippage_model: "adaptive"
  paper_commission_pct: 0.15

backtest:
  start_date: "2022-01-01"
  end_date: "2024-01-01"
  initial_capital: 1000000.0
  commission_bps: 1.0
  walk_forward_periods: 12
  out_of_sample_ratio: 0.2
