# EDGECORE — Equity Production Configuration
# Market: US Equities via Interactive Brokers (LIVE)
# Annualisation: 252 trading days
# audit 2026-02-22 — equity migration (Option A: 100% US equities via IBKR)
#
# Production config is more conservative than dev:
#   - Tighter risk limits
#   - More symbols for diversification
#   - Lower allocation per pair

market:
  type: "equity"
  trading_days_per_year: 252
  currency: "USD"

strategy:
  lookback_window: 252
  entry_z_score: 2.0
  exit_z_score: 0.0
  min_correlation: 0.7
  max_half_life: 60
  use_kalman: true
  max_position_loss_pct: 0.025    # 2.5% P&L stop (tighter in prod)

trading_universe:
  symbols:
    # === TIER 1: Mega-cap sector leaders (highest liquidity) ===
    # Technology
    - "AAPL"
    - "MSFT"
    - "GOOGL"
    - "META"
    - "NVDA"
    - "AMD"
    - "INTC"
    - "AVGO"
    - "CRM"
    - "ADBE"
    - "ORCL"
    - "CSCO"
    - "TXN"
    - "QCOM"
    # Financials
    - "JPM"
    - "BAC"
    - "GS"
    - "MS"
    - "WFC"
    - "C"
    - "BLK"
    - "SCHW"
    - "AXP"
    - "USB"
    # Healthcare / Pharma / Biotech
    - "JNJ"
