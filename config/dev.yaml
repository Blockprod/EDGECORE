strategy:
  lookback_window: 252
  entry_z_score: 2.0
  exit_z_score: 0.0
  min_correlation: 0.7
  max_half_life: 60

trading_universe:
  # 50+ major cryptocurrencies for Statistical Arbitrage
  # Wider universe = better cointegration discovery
  symbols:
    # Top tier (mega cap)
    - "BTC/USDT"
    - "ETH/USDT"
    # Large cap
    - "BNB/USDT"
    - "XRP/USDT"
    - "ADA/USDT"
    - "SOL/USDT"
    - "DOGE/USDT"
    - "AVAX/USDT"
    - "LINK/USDT"
    - "DOT/USDT"
    # Mid cap
    - "MATIC/USDT"
    - "LTC/USDT"
    - "TRX/USDT"
    - "NEAR/USDT"
    - "ATOM/USDT"
    - "HBAR/USDT"
    - "FTT/USDT"
    - "ARB/USDT"
    - "OP/USDT"
    - "AAVE/USDT"
    # Exchange tokens
    - "UNI/USDT"
    - "CAKE/USDT"
    - "SUSHI/USDT"
    # Gaming/Metaverse
    - "SAND/USDT"
    - "MANA/USDT"
    - "ENJ/USDT"
    - "GALA/USDT"
    # Layer 2 / Cross-chain
    - "FLOW/USDT"
    - "VET/USDT"
    # Classic alts
    - "ETC/USDT"
    - "LTC/USDT"
    - "ZEC/USDT"
    - "XLM/USDT"
    - "XMR/USDT"
    # DeFi tokens
    - "MKR/USDT"
    - "SNX/USDT"
    - "YFI/USDT"
    - "COMP/USDT"
    - "CRV/USDT"
    - "LDO/USDT"
    - "GMX/USDT"
    # Layer 2 new
    - "IMX/USDT"
    - "LUNC/USDT"
    - "ONE/USDT"
    - "FIL/USDT"
    - "ICP/USDT"

  max_leverage: 3.0

execution:
  engine: "ccxt"
  exchange: "binance"
  timeout_seconds: 30
  max_retries: 3
  slippage_bps: 5.0
  use_sandbox: true
  paper_trading_loop_interval_seconds: 10
  initial_capital: 100000.0
  paper_slippage_model: "fixed_bps"
  paper_commission_pct: 0.1
backtest:
  start_date: "2023-01-01"
  end_date: "2024-01-01"
  initial_capital: 100000.0
  commission_bps: 2.0
  walk_forward_periods: 4
  out_of_sample_ratio: 0.2
