# EDGECORE — Equity Development Configuration
# Market: US Equities via Interactive Brokers
# Annualisation: 252 trading days
# audit 2026-02-22 — equity migration (Option A: 100% US equities via IBKR)
#
# Pair selection rationale:
#   Sector-matched pairs with genuine economic cointegration drivers
#   (same industry, common factor exposure, regulatory overlap).

market:
  type: "equity"
  trading_days_per_year: 252
  currency: "USD"

strategy:
  lookback_window: 120
  entry_z_score: 1.6              # v31: lowered from 2.0 for more entries
  exit_z_score: 0.5
  entry_z_min_spread: 0.50        # Min absolute spread ($) filter
  short_sizing_multiplier: 0.50   # Short sizing x 0.5 in TRENDING/NEUTRAL bull (P1 fix)
  disable_shorts_in_bull_trend: false
  regime_directional_filter: false  # Default OFF for backward compat
  trend_long_sizing: 0.75
  min_correlation: 0.60            # v31: lowered from 0.7 for more qualifying pairs
  max_half_life: 70                # v31: raised from 60 to accept slower-reverting pairs
  use_kalman: true                # Dynamic hedge ratio (Kalman filter ON)
  max_position_loss_pct: 0.10     # 10% P&L stop per position

regime:
  enabled: true
  ma_fast: 50
  ma_slow: 200
  vol_threshold: 0.18
  vol_window: 20
  neutral_band_pct: 0.02
  trend_favorable_sizing: 0.80    # v30: sizing for favorable side in trends
  neutral_sizing: 0.65            # v30: sizing for both sides in NEUTRAL

momentum:
  enabled: true
  lookback: 20                    # Rolling return window (bars)
  weight: 0.30                    # Momentum weight in strength adjustment
  min_strength: 0.30              # Floor for contra-momentum signals
  max_boost: 1.0                  # Cap for momentum-confirmed signals

signal_combiner:
  enabled: true
  zscore_weight: 0.70             # Weight for z-score signal
  momentum_weight: 0.30           # Weight for momentum signal
  entry_threshold: 0.6            # Composite threshold for entry
  exit_threshold: 0.2             # Composite threshold for exit

