[pytest]
# Test discovery patterns - find all test files with numbers
python_files = *_test.py test_*.py ???_test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Options
addopts =
    -v
    --tb=short
    --strict-markers

# Markers
markers =
    integration: Integration tests
    unit: Unit tests
    slow: Slow running tests
    e2e: End-to-end tests
