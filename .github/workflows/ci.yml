name: CI

on:
  push:
    branches:
      - main
      - lfs-migration-preview
      - fix/**
      - feat/**
      - chore/**
  pull_request:
    branches:
      - main

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - 3.11

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Install package in editable mode if present
          python -m pip install -e . || true

      - name: Lint (ruff)
        run: |
          ruff check .

      - name: Type check (mypy)
        # Non-blocking: reports errors but does not fail the pipeline (existing debt).
        # Target: 0 errors in risk/ and execution/ — fix progressively.
        continue-on-error: true
        run: |
          mypy risk/ risk_engine/ execution/ --ignore-missing-imports --no-error-summary

      - name: Security audit (pip-audit)
        run: |
          pip-audit --skip-editable

      - name: Run tests with coverage
        run: |
          pytest -q --cov=. --cov-report=term-missing --cov-fail-under=40
