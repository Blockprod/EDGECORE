name: EDGECORE CI

on:
  push:
    branches:
      - main
      - fix/**
      - feat/**
      - chore/**
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─────────────────────────────────────────────────────────────
  # AUTOFIX — ruff check+format auto-commit (PR only)
  # ─────────────────────────────────────────────────────────────
  autofix:
    name: Ruff autofix
    if: github.event_name == 'pull_request' && github.actor != 'edgecore-bot'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install ruff
        run: pip install ruff

      - name: Ruff autofix
        run: ruff check . --fix

      - name: Ruff format
        run: ruff format .

      - name: Commit fixes
        run: |
          if ! git diff --quiet; then
            git config user.name "edgecore-bot"
            git config user.email "bot@edgecore.ai"
            git commit -am "auto-fix: ruff + format"
            git push
          fi

  # ─────────────────────────────────────────────────────────────
  # TESTS — lint + types + security + tests + coverage
  # if: always() → s'exécute même si autofix est skippé (push main)
  # ─────────────────────────────────────────────────────────────
  tests:
    name: Run tests
    needs: autofix
    if: always() && github.actor != 'edgecore-bot'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ruff pyright "cython>=3.0,<4.0" numpy pip-audit
          python -m pip install -e . || true

      # ─────────────────────────────
      # Build Cython (critique)
      # ─────────────────────────────
      - name: Build Cython extensions
        run: python setup.py build_ext --inplace

      # ─────────────────────────────
      # Lint & Types (fail fast)
      # ─────────────────────────────
      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy — scoped)
        run: mypy risk/ risk_engine/ execution/ --ignore-missing-imports --no-error-summary

      - name: Type check (pyright — P2-P4 scope)
        run: |
          pyright data/feature_store.py models/spread.py \
            tests/statistical/test_strategy_robustness.py \
            tests/regression/test_pnl_regression.py \
            tests/regression/conftest.py

      # ─────────────────────────────
      # Security
      # ─────────────────────────────
      - name: Security audit (pip-audit)
        run: |
          # CVE-2026-4539 (pygments transitive dep): no fix version available yet — tracked, ignore until patch released
          pip-audit --skip-editable --ignore-vuln CVE-2026-4539

      - name: Secret scan (trufflehog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      # ─────────────────────────────
      # Tests + Coverage
      # ─────────────────────────────
      - name: Core tests + coverage
        run: |
          pytest -q -p no:cacheprovider -m "not slow" \
            --cov=. \
            --cov-report=term \
            --cov-config=pyproject.toml \
            --cov-fail-under=70

      - name: Statistical tests
        run: pytest tests/statistical/ -q -m slow

      - name: Regression tests
        run: pytest tests/regression/ -q

  # ─────────────────────────────────────────────────────────────
  # DOCKER — build gate + push vers ghcr.io sur branche main
  # ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image (+ push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/edgecore:latest
            ghcr.io/${{ github.repository_owner }}/edgecore:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max