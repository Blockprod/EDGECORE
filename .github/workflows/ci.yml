name: CI

on:
  push:
    branches:
      - main
      - lfs-migration-preview
      - fix/**
      - feat/**
      - chore/**
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - 3.11

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Install package in editable mode if present
          python -m pip install -e . || true

      - name: Build Cython extensions
        run: |
          pip install "cython>=3.0,<4.0" numpy
          python setup.py build_ext --inplace

      - name: Lint (ruff)
        run: |
          ruff check .

      - name: Type check (mypy)
        run: |
          mypy risk/ risk_engine/ execution/ --ignore-missing-imports --no-error-summary

      - name: Security audit (pip-audit)
        run: |
          pip-audit --skip-editable

      - name: Secret scan (trufflehog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Run tests with coverage
        run: |
          pytest -q --cov=. --cov-report=term-missing --cov-fail-under=70

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: edgecore:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max
