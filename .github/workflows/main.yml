name: EDGECORE CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11.9"
  EDGECORE_ENV: "test"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"
          pip install ruff

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Mypy type check
        run: mypy --ignore-missing-imports --no-error-summary strategies/ models/ risk/ risk_engine/ signal_engine/ portfolio_engine/

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/ -m "not integration and not slow and not e2e" \
            --tb=short \
            --junitxml=reports/unit-results.xml \
            --cov=strategies --cov=models --cov=risk --cov=risk_engine \
            --cov=signal_engine --cov=portfolio_engine --cov=execution \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=60

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: reports/

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          pytest tests/ -m "integration" \
            --tb=short \
            --junitxml=reports/integration-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: reports/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t edgecore:${{ github.sha }} .

      - name: Verify container health
        run: |
          docker run -d --name edgecore-test \
            -e EDGECORE_ENV=test \
            edgecore:${{ github.sha }}
          sleep 5
          docker inspect --format='{{.State.Running}}' edgecore-test | grep true
          docker stop edgecore-test
